name: Deploy to Contabo

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/falz
            git pull origin master
            docker build -t falz-app .
            docker stop falz-app && docker rm falz-app
            # Fix DATABASE_URL to use linked container hostname instead of localhost
            DB_URL=$(grep DATABASE_URL /opt/falz/.env | head -1 | cut -d= -f2- | tr -d '"' | sed 's/@localhost:/@falz-postgres:/')
            docker run -d \
              --name falz-app \
              --restart always \
              --link falz-postgres \
              -p 3000:3000 \
              --env-file /opt/falz/.env \
              -e NEXTAUTH_URL=http://falzapp.duckdns.org \
              -e DATABASE_URL="$DB_URL" \
              falz-app
            docker image prune -f

            # Setup nginx reverse proxy (port 80 -> 3000)
            if ! command -v nginx &> /dev/null; then
              apt-get update -qq && apt-get install -y -qq nginx > /dev/null 2>&1
            fi
            cat > /etc/nginx/sites-available/falz <<'NGINX'
            server {
                listen 80;
                server_name falzapp.duckdns.org _;

                location / {
                    proxy_pass http://127.0.0.1:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                }
            }
            NGINX
            ln -sf /etc/nginx/sites-available/falz /etc/nginx/sites-enabled/falz
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl reload nginx || systemctl start nginx
