name: Deploy to Contabo

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/falz
            git pull origin master
            docker build -t falz-app .
            docker stop falz-app && docker rm falz-app
            docker run -d \
              --name falz-app \
              --restart always \
              --link falz-postgres \
              -p 3000:3000 \
              --env-file /opt/falz/.env \
              -e NEXTAUTH_URL=http://falzapp.duckdns.org:3000 \
              falz-app
            docker image prune -f
