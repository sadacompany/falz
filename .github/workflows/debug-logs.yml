name: Debug Server Logs

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Docker logs
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "=== Container Status ==="
            docker ps -a --filter name=falz
            echo ""
            echo "=== Last 100 lines of app logs ==="
            docker logs falz-app --tail 100 2>&1
            echo ""
            echo "=== Postgres container status ==="
            docker ps -a --filter name=postgres
            echo ""
            echo "=== Test DB connection ==="
            docker exec falz-app node -e "
              const { PrismaClient } = require('@prisma/client');
              const p = new PrismaClient();
              p.office.findFirst({ where: { slug: 'dar-al-aseel' }, select: { id: true, name: true, isActive: true, isApproved: true } })
                .then(r => console.log('DB OK:', JSON.stringify(r)))
                .catch(e => console.error('DB ERROR:', e.message))
                .finally(() => p.\$disconnect());
            " 2>&1
